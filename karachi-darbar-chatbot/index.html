<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Karachi Darbar — Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:       #0f0e0d;
  --bg2:      #1a1815;
  --bg3:      #242118;
  --border:   rgba(255,255,255,0.08);
  --border2:  rgba(255,255,255,0.15);
  --text:     #f0ede6;
  --text2:    #a09b90;
  --text3:    #5c5850;
  --red:      #8b1a1a;
  --red2:     #a52020;
  --gold:     #c9962a;
  --bot-bub:  #1e1c17;
  --user-bub: #8b1a1a;
}
[data-theme="light"] {
  --bg:       #faf7f2;
  --bg2:      #ffffff;
  --bg3:      #f2ede4;
  --border:   rgba(0,0,0,0.07);
  --border2:  rgba(0,0,0,0.13);
  --text:     #1a1612;
  --text2:    #6b6356;
  --text3:    #b0a99e;
  --bot-bub:  #f0ece4;
  --user-bub: #8b1a1a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(circle at 15% 50%, rgba(139,26,26,0.07) 0%, transparent 55%),
    radial-gradient(circle at 85% 20%, rgba(201,150,42,0.05) 0%, transparent 50%);
  pointer-events:none;
}

/* ── App shell ── */
.app{
  width:100%;max-width:480px;
  height:100vh;max-height:740px;
  background:var(--bg2);
  border:0.5px solid var(--border2);
  border-radius:22px;
  display:flex;flex-direction:column;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

/* ── Header ── */
.header{
  background:var(--red);
  height:66px;
  padding:0 16px;
  display:flex;align-items:center;gap:12px;
  flex-shrink:0;
  position:relative;
}
.header::after{
  content:'';
  position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,150,42,0.6),transparent);
}
.logo{
  width:42px;height:42px;
  background:var(--gold);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.hinfo{flex:1;}
.hname{
  font-family:'Playfair Display',serif;
  font-size:17px;color:#fff;line-height:1.2;
}
.hmeta{font-size:11px;color:rgba(255,255,255,0.6);margin-top:2px;}
.hright{display:flex;align-items:center;gap:8px;}
.online{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,0.7);}
.dot{width:7px;height:7px;background:#4ade80;border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.theme-btn{
  width:30px;height:30px;
  background:rgba(255,255,255,0.12);
  border:none;border-radius:50%;
  cursor:pointer;color:#fff;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.theme-btn:hover{background:rgba(255,255,255,0.22);}
.theme-btn svg{width:14px;height:14px;}

/* ── Quick chips ── */
.chips{
  padding:9px 13px;
  display:flex;gap:6px;flex-wrap:wrap;
  border-bottom:0.5px solid var(--border);
  background:var(--bg3);
  flex-shrink:0;
}
.chip{
  font-size:11px;font-weight:500;
  background:var(--bg2);
  border:0.5px solid var(--border2);
  border-radius:99px;
  padding:5px 11px;
  cursor:pointer;color:var(--text2);
  transition:all .15s;white-space:nowrap;
}
.chip:hover{background:var(--red);color:#fff;border-color:var(--red);}

/* ── Messages ── */
.msgs{
  flex:1;overflow-y:auto;
  padding:14px 13px;
  display:flex;flex-direction:column;gap:12px;
  scroll-behavior:smooth;
}
.msgs::-webkit-scrollbar{width:3px;}
.msgs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

.row{display:flex;align-items:flex-end;gap:8px;}
.row.user{flex-direction:row-reverse;}
.av{
  width:28px;height:28px;border-radius:50%;
  background:var(--red);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0;
}
.av.user{background:var(--gold);}
.bwrap{display:flex;flex-direction:column;max-width:78%;}
.row.user .bwrap{align-items:flex-end;}
.bubble{
  padding:10px 13px;
  border-radius:16px;
  font-size:14px;line-height:1.6;
  word-break:break-word;
}
.bot .bubble{
  background:var(--bot-bub);
  border:0.5px solid var(--border);
  border-bottom-left-radius:4px;
  color:var(--text);
}
.user .bubble{
  background:var(--user-bub);
  color:#fff;
  border-bottom-right-radius:4px;
}
.btime{font-size:10px;color:var(--text3);margin-top:3px;padding:0 2px;}

/* typing */
.typing-bub{
  background:var(--bot-bub);
  border:0.5px solid var(--border);
  border-radius:16px;border-bottom-left-radius:4px;
  padding:12px 15px;
  display:flex;gap:4px;align-items:center;
}
.tdot{
  width:6px;height:6px;
  background:var(--gold);border-radius:50%;
  animation:bounce 1.2s infinite;
}
.tdot:nth-child(2){animation-delay:.2s}
.tdot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

/* ── Input ── */
.input-area{
  border-top:0.5px solid var(--border);
  background:var(--bg3);
  padding:10px 12px 13px;
  display:flex;gap:8px;align-items:flex-end;
  flex-shrink:0;
}
.input-wrap{
  flex:1;
  background:var(--bg2);
  border:0.5px solid var(--border2);
  border-radius:22px;
  display:flex;align-items:flex-end;
  padding:0 10px 0 14px;
  transition:border-color .15s;
}
.input-wrap:focus-within{border-color:var(--gold);}
#inp{
  flex:1;background:none;border:none;outline:none;
  font-family:'DM Sans',sans-serif;
  font-size:14px;color:var(--text);
  padding:10px 4px;
  resize:none;max-height:90px;line-height:1.5;
}
#inp::placeholder{color:var(--text3);}
.send-btn{
  width:40px;height:40px;
  background:var(--red);
  border:none;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:background .15s,transform .1s;
  box-shadow:0 2px 10px rgba(139,26,26,0.4);
}
.send-btn:hover{background:var(--red2);}
.send-btn:active{transform:scale(.92);}
.send-btn svg{width:15px;height:15px;fill:#fff;}

@media(max-width:500px){
  .app{border-radius:0;max-height:100vh;}
}
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="logo">🍛</div>
    <div class="hinfo">
      <div class="hname">Karachi Darbar</div>
      <div class="hmeta">Saddar, Karachi &nbsp;·&nbsp; 12 PM – 12 AM</div>
    </div>
    <div class="hright">
      <div class="online"><div class="dot"></div>Online</div>
      <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme">
        <svg id="ticon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Quick chips -->
  <div class="chips" id="chips">
    <span class="chip" onclick="quick('Menu dikhao')">🍽️ Menu</span>
    <span class="chip" onclick="quick('Table book karni hai')">📅 Booking</span>
    <span class="chip" onclick="quick('Timing kya hai?')">⏰ Timing</span>
    <span class="chip" onclick="quick('Location kahan hai?')">📍 Location</span>
    <span class="chip" onclick="quick('Prices kya hain?')">💰 Prices</span>
  </div>

  <!-- Messages -->
  <div class="msgs" id="msgs"></div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="inp" rows="1"
        placeholder="Apna sawaal likhein..."
        oninput="resize(this)"
        onkeydown="keydown(event)"></textarea>
    </div>
    <button class="send-btn" onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script>
const API = "http://localhost:5000/chat";
let history = [];
let busy = false;

/* ── Theme ── */
function toggleTheme() {
  const html = document.documentElement;
  const dark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', dark ? 'light' : 'dark');
  document.getElementById('ticon').querySelector('path').setAttribute('d',
    dark
    ? 'M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42M12 6a6 6 0 000 12A6 6 0 0012 6z'
    : 'M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z'
  );
}

/* ── Helpers ── */
function now() {
  return new Date().toLocaleTimeString('en-PK',{hour:'2-digit',minute:'2-digit'});
}
function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 90) + 'px';
}
function keydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}
function quick(txt) {
  document.getElementById('inp').value = txt;
  send();
}

/* ── Add message ── */
function addMsg(text, role) {
  const msgs = document.getElementById('msgs');
  const row = document.createElement('div');
  row.className = 'row ' + role;

  const av = document.createElement('div');
  av.className = 'av ' + role;
  av.textContent = role === 'bot' ? '🍛' : '🙂';

  const bwrap = document.createElement('div');
  bwrap.className = 'bwrap';

  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.textContent = text;

  const t = document.createElement('div');
  t.className = 'btime';
  t.textContent = now();

  bwrap.appendChild(bub);
  bwrap.appendChild(t);

  if (role === 'bot') { row.appendChild(av); row.appendChild(bwrap); }
  else                { row.appendChild(bwrap); row.appendChild(av); }

  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

/* ── Typing indicator ── */
function showTyping() {
  const msgs = document.getElementById('msgs');
  const row = document.createElement('div');
  row.className = 'row bot'; row.id = 'typing';
  const av = document.createElement('div');
  av.className = 'av bot'; av.textContent = '🍛';
  const bub = document.createElement('div');
  bub.className = 'typing-bub';
  bub.innerHTML = '<div class="tdot"></div><div class="tdot"></div><div class="tdot"></div>';
  row.appendChild(av); row.appendChild(bub);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}
function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

/* ── Send ── */
async function send() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text || busy) return;
  busy = true;
  inp.value = ''; inp.style.height = 'auto';

  // Hide chips after first message
  document.getElementById('chips').style.display = 'none';

  addMsg(text, 'user');
  history.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });
    const data = await res.json();
    hideTyping();
    const reply = data.reply || 'Kuch masla hua, dobara try karein.';
    addMsg(reply, 'bot');
    history.push({ role: 'assistant', content: reply });
  } catch(e) {
    hideTyping();
    addMsg('⚠️ Server se connection nahi! Cursor mein "python app.py" chal raha hai?', 'bot');
  }
  busy = false;
}

/* ── Welcome message ── */
window.onload = () => {
  setTimeout(() => {
    addMsg('Assalam o Alaikum! 🍛 Karachi Darbar mein khush aamdeed! Main aapki kya madad kar sakta hoon?', 'bot');
  }, 400);
};
</script>
</body>
</html>
